<!DOCTYPE html>
<html>
<head>
    <title>Test POST</title>
</head>
<body>
    <h1>Diagnostic POST</h1>
    
    <h2>1. Test POST direct (sans routeur)</h2>
    <button onclick="testDirect()">Tester POST direct</button>
    <pre id="result1" style="background: #f0f0f0; padding: 10px; overflow: auto;"></pre>
    
    <h2>2. Test POST via routeur (index.php)</h2>
    <button onclick="testRouter()">Tester POST via routeur</button>
    <pre id="result2" style="background: #f0f0f0; padding: 10px; overflow: auto;"></pre>
    
    <h2>3. Test Login via routeur</h2>
    <button onclick="testLogin()">Tester Login POST</button>
    <pre id="result3" style="background: #f0f0f0; padding: 10px; overflow: auto;"></pre>
    
    <script>
        async function testDirect() {
            const result = document.getElementById('result1');
            try {
                const response = await fetch('/Bralima_logistique/public/post_test.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ test: 'direct' })
                });
                result.textContent = 'Status: ' + response.status + '\n' + await response.text();
            } catch (e) {
                result.textContent = 'Erreur: ' + e.message;
            }
        }
        
        async function testRouter() {
            const result = document.getElementById('result2');
            try {
                const response = await fetch('/Bralima_logistique/public/api/auth/posttest', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ test: 'router' })
                });
                result.textContent = 'Status: ' + response.status + '\n' + await response.text();
            } catch (e) {
                result.textContent = 'Erreur: ' + e.message;
            }
        }
        
        async function testLogin() {
            const result = document.getElementById('result3');
            try {
                const response = await fetch('/Bralima_logistique/public/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username: 'admin', password: 'admin123' })
                });
                result.textContent = 'Status: ' + response.status + '\n' + await response.text();
            } catch (e) {
                result.textContent = 'Erreur: ' + e.message;
            }
        }
    </script>
</body>
</html>
